<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Japanese Learning Portal</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f5f7fa;
            --text-color: #333;
            --card-bg: #fff;
        }

        body {
            font-family: 'Segoe UI', 'Meiryo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            margin-bottom: 2rem;
            font-size: 2.5rem;
            color: #2c3e50;
        }

        .menu-container {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .menu-card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 30px;
            width: 280px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: inherit;
            cursor: pointer;
        }

        .menu-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 15px rgba(0,0,0,0.15);
        }

        .menu-card h2 {
            margin-top: 0;
            color: var(--primary-color);
        }

        .menu-card p {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.5;
        }

        .japanese-text {
            display: block;
            font-size: 1.5rem;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>Japanese Learning Portal</h1>
    
    <div class="menu-container">
        <a href="/ANKI_SENTENCE.html" class="menu-card">
            <span class="japanese-text">例文暗記</span>
            <h2>ANKI SENTENCE</h2>
            <p>Practice Japanese sentences using Anki-style cards.</p>
        </a>

        <a href="/VOCAB.html" class="menu-card">
            <span class="japanese-text">単語学習</span>
            <h2>VOCABULARY</h2>
            <p>Study and review Japanese vocabulary with detailed lists.</p>
        </a>
    </div>
</body>
</html>
